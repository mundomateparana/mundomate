<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundo Mate</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f5f5f5;
}

header {
    background-color: #2e7d32;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    padding: 20px;
}

.productos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.producto {
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.producto img {
    width: 100%;
    border-radius: 10px;
}

.precio {
    font-size: 20px;
    color: #2e7d32;
    margin: 10px 0;
}

.boton {
    display: inline-block;
    background: #25d366;
    color: white;
    padding: 10px;
    border-radius: 5px;
    text-decoration: none;
}

footer {
    text-align: center;
    padding: 15px;
    background: #ddd;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
    <h1>Mundo Mate</h1>
    <p>Los mejores mates de Paraná</p>
</header>

<div class="container">

    <h2>Productos</h2>

    <div class="productos">

        <div class="producto">
            <img src="https://via.placeholder.com/200" alt="Mate">
            <h3>Mate Imperial</h3>
            <p class="precio">$15000</p>
            <a class="boton" href="https://wa.me/5493430000000?text=Hola%20quiero%20comprar%20Mate%20Imperial">Comprar</a>
        </div>

    </div>

</div>

<footer>
    <p>© 2026 Mundo Mate</p>
</footer>

</body>
</html>
